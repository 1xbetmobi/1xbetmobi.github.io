<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Données sauvegardées</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #f7f7f7;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .data-container {
      background: #fff;
      padding: 32px 28px 28px 28px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.12);
      max-width: 350px;
      width: 100%;
    }
    .data-container h2 {
      color: #0071ce;
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .data-container p {
      font-size: 1.08rem;
      color: #222;
      margin: 12px 0;
      padding: 6px 0;
      border-bottom: 1px solid #f2f2f2;
    }
    .data-container .btn-retour {
      display: block;
      width: 100%;
      background: #0071ce;
      color: #fff;
      font-size: 1rem;
      padding: 10px 0;
      border: none;
      border-radius: 4px;
      margin-top: 18px;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
    }
    .data-container .btn-retour:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <div class="data-container">
    <h2>Données saisies</h2>
    <p>Nom d'utilisateur : <strong id="showUsername"></strong></p>
    <p>Mot de passe : <strong id="showPassword"></strong></p>
    <p>Adresse email : <strong id="showEmail"></strong></p>
    <a href="index.html" class="btn-retour">Retour</a>
  </div>
  <script>
    document.getElementById('showUsername').textContent = localStorage.getItem('username') || '';
    document.getElementById('showPassword').textContent = localStorage.getItem('password') || '';
    document.getElementById('showEmail').textContent = localStorage.getItem('email') || '';
  </script>
</body>
</html>
