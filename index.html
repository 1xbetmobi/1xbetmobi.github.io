<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion 1xBet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #f7f7f7;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: #fff;
      padding: 32px 28px 28px 28px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.12);
      max-width: 350px;
      width: 100%;
    }
    .login-container h1 {
      color: #0071ce;
      text-align: center;
      margin-bottom: 24px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .login-container label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #222;
    }
    .login-container input[type="text"],
    .login-container input[type="password"],
    .login-container input[type="email"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #d0d4d9;
      border-radius: 4px;
      background: #f6f8fa;
      font-size: 1rem;
    }
    .login-container button {
      background: #0071ce;
      color: #fff;
      font-size: 1.1rem;
      padding: 12px 0;
      border: none;
      border-radius: 4px;
      width: 100%;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .login-container button:hover {
      background: #005fa3;
    }
    .login-container .help {
      text-align: right;
      margin-top: 10px;
      font-size: 0.95rem;
    }
    .login-container .help a {
      color: #0071ce;
      text-decoration: none;
    }
    .login-container .help a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Connexion</h1>
    <form id="loginForm">
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" name="username" placeholder="Votre nom d'utilisateur" required>
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="Votre mot de passe" required>
      <label for="email">Adresse email</label>
      <input type="email" id="email" name="email" placeholder="Votre adresse email" required>
      <button type="submit">Connecter</button>
      <div class="help">
        <a href="#">Mot de passe oublié ?</a>
      </div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Récupère les valeurs
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const email = document.getElementById('email').value;

      // Sauvegarde dans localStorage
      localStorage.setItem('username', username);
      localStorage.setItem('password', password);
      localStorage.setItem('email', email);

      // Redirige vers la page suivante
      window.location.href = 'sauvegarde.html';
    });
  </script>
</body>
</html>
